name: GitHubAutoUpdaterApp
options:
  bundleIdPrefix: com.core
  deploymentTarget:
    iOS: '17.0'
settings:
  base:
    SWIFT_VERSION: 5.0
    PRODUCT_BUNDLE_IDENTIFIER: com.core.githubautoupdater
    INFOPLIST_FILE: GitHubAutoUpdaterApp/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  GitHubAutoUpdaterApp:
    type: application
    platform: iOS
    sources:
      - path: GitHubAutoUpdaterApp
    settings:
      base:
        PRODUCT_NAME: GitHub Auto Updater
        INFOPLIST_KEY_CFBundleDisplayName: GitHub Auto Updater
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIRequiredDeviceCapabilities:
          - armv7
        INFOPLIST_KEY_LSRequiresIPhoneOS: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: Access your Mac helper server on the local network to monitor updater status.
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers:
          - com.core.githubautoupdater.refresh
        INFOPLIST_KEY_UIBackgroundModes:
          - fetch
        INFOPLIST_KEY_CFBundleShortVersionString: 0.1.0
        INFOPLIST_KEY_CFBundleVersion: 1
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1,2
        SUPPORTS_MACCATALYST: NO
    scheme:
      testTargets: []
